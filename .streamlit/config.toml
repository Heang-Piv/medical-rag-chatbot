[server]
# Disables Streamlit's dev-mode source-file watcher. It's a hot-reload
# convenience for local development that has no benefit on a deployed
# app, and it was the source of noisy (but harmless) tracebacks in the
# Cloud logs from transformers' lazy-loaded, torchvision-only vision
# submodules -- unrelated to this project, which only uses text embeddings.
fileWatcherType = "none"
# Hard ceiling on any single file_uploader upload (MB). rag/ingest.py's
# MAX_UPLOAD_BYTES (5 MB) is the real per-file limit shown to the user;
# this is just an outer server-level guard.
maxUploadSize = 10

[theme]
base = "dark"
primaryColor = "#3B82F6"             # blue accent — buttons, active tab, slider
backgroundColor = "#0E1117"          # near-black page background
secondaryBackgroundColor = "#1B2430" # sidebar / widget background, slightly lifted
textColor = "#E5E7EB"
